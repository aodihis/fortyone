name: Publish Docker Images

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./be
          push: true
          tags: ghcr.io/aodihis/fortyone-be:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./fe
          push: true
          tags: ghcr.io/aodihis/fortyone-fe:latest
          build-args: |
            API_URL=${{ vars.API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/apps/fortyone

            # Write .env from GitHub variables and secrets
            printf 'HOST=%s\nALLOWED_ORIGIN=%s\nLOG_LEVEL=%s\nJWT_SECRET=%s\n' \
              '${{ vars.HOST }}' \
              '${{ vars.ALLOWED_ORIGIN }}' \
              '${{ vars.LOG_LEVEL }}' \
              '${{ secrets.JWT_SECRET }}' \
              > /opt/apps/fortyone/.env

            # Pull latest images and restart
            docker compose -f /opt/apps/fortyone/docker-compose.prod.yml pull
            docker compose -f /opt/apps/fortyone/docker-compose.prod.yml up -d
