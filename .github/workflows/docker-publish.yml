name: Publish Docker Images

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./be
          push: true
          tags: |
            ghcr.io/aodihis/fortyone-be:latest
            ghcr.io/aodihis/fortyone-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./fe
          push: true
          tags: |
            ghcr.io/aodihis/fortyone-fe:latest
            ghcr.io/aodihis/fortyone-fe:${{ github.sha }}
          build-args: |
            API_URL=${{ vars.API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.VPS_HOST }} >> ~/.ssh/known_hosts

          # Ensure app directory exists before scp
          ssh -i ~/.ssh/deploy_key ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} \
            "mkdir -p /opt/apps/fortyone"

          # Copy compose file to VPS
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml \
            ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:/opt/apps/fortyone/docker-compose.prod.yml

          # Write .env and restart on VPS
          ssh -i ~/.ssh/deploy_key ${{ vars.VPS_USER }}@${{ vars.VPS_HOST }} bash <<'ENDSSH'
            set -e
            printf 'HOST=%s\nALLOWED_ORIGIN=%s\nLOG_LEVEL=%s\nJWT_SECRET=%s\nREDIS_URL=%s\nREDIS_KEY_PREFIX=%s\nRECONNECT_TIMEOUT_SECS=%s\n' \
              '${{ vars.HOST }}' \
              '${{ vars.ALLOWED_ORIGIN }}' \
              '${{ vars.LOG_LEVEL }}' \
              '${{ secrets.JWT_SECRET }}' \
              '${{ secrets.REDIS_URL }}' \
              '${{ vars.REDIS_KEY_PREFIX }}' \
              '${{ vars.RECONNECT_TIMEOUT_SECS || 120 }}' \
              > /opt/apps/fortyone/.env
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/apps/fortyone
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
          ENDSSH
