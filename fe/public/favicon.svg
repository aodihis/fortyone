<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Card background -->
  <rect x="2" y="1" width="28" height="30" rx="4" ry="4" fill="#f5e6c8"/>
  <!-- Card border -->
  <rect x="2" y="1" width="28" height="30" rx="4" ry="4" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
  <!-- Red suit pip top-left (heart) -->
  <text x="4.5" y="8.5" font-family="serif" font-size="6" fill="#c0392b">♥</text>
  <!-- Red suit pip bottom-right (heart, rotated) -->
  <text x="27.5" y="28" font-family="serif" font-size="6" fill="#c0392b" text-anchor="middle" transform="rotate(180 22 25.5)">♥</text>
  <!-- "41" centered, bold, dark -->
  <text x="16" y="21" font-family="Georgia, serif" font-size="13" font-weight="900" fill="#1a2e1a" text-anchor="middle">41</text>
</svg>
